<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Potree Viewer</title>

  <link rel="stylesheet" href="./libs/potree/potree.css">
  <link rel="stylesheet" href="./libs/jquery-ui/jquery-ui.min.css">
  <link rel="stylesheet" href="./libs/openlayers3/ol.css">
  <link rel="stylesheet" href="./libs/spectrum/spectrum.css">
  <link rel="stylesheet" href="./libs/jstree/themes/mixed/style.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0d1210; overflow: hidden; }

    /* Hide Potree sidebar — we provide our own UI */
    #potree_sidebar_container,
    .potree_menu_toggle { display: none !important; }

    /* Potree's CSS sets left:300px on the render area to make room for the sidebar.
       Since we hide the sidebar, force the render area to fill the full iframe. */
    #potree_render_area { left: 0 !important; }

    /* Loading overlay */
    #loading-overlay {
      position: fixed; inset: 0;
      background: #0d1210;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 1rem;
      z-index: 100;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    #loading-overlay.hidden { opacity: 0; }

    .spinner {
      width: 36px; height: 36px;
      border: 2px solid rgba(255,255,255,0.12);
      border-top-color: rgba(160,210,160,0.7);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-family: ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body>

  <div class="potree_container" style="position:absolute;width:100%;height:100%;left:0;top:0;">
    <div id="potree_render_area"></div>
    <div id="potree_sidebar_container"></div>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-label">Loading scan…</div>
  </div>

  <script src="./libs/jquery/jquery-3.1.1.min.js"></script>
  <script src="./libs/spectrum/spectrum.js"></script>
  <script src="./libs/jquery-ui/jquery-ui.min.js"></script>
  <script src="./libs/other/BinaryHeap.js"></script>
  <script src="./libs/tween/tween.min.js"></script>
  <script src="./libs/d3/d3.js"></script>
  <script src="./libs/proj4/proj4.js"></script>
  <script src="./libs/openlayers3/ol.js"></script>
  <script src="./libs/i18next/i18next.js"></script>
  <script src="./libs/jstree/jstree.js"></script>
  <script src="./libs/potree/potree.js"></script>
  <script src="./libs/plasio/js/laslaz.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const scanPath = params.get("path");

    window.viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

    viewer.setEDLEnabled(true);
    viewer.setFOV(60);
    viewer.setPointBudget(5_000_000);
    viewer.setBackground("gradient");
    viewer.loadSettingsFromURL();

    viewer.loadGUI(() => {
      viewer.setLanguage("en");
      viewer.toggleSidebar();
    });

    // Load the scan — called in parallel with loadGUI, matching the reference template
    if (scanPath) {
      Potree.loadPointCloud(scanPath, "scan", function(e) {
        const pointcloud = e.pointcloud;
        const material   = pointcloud.material;
        material.size               = 1;
        material.pointSizeType      = Potree.PointSizeType.FIXED;
        material.shape              = Potree.PointShape.CIRCLE;
        material.activeAttributeName = "rgba";

        viewer.scene.addPointCloud(pointcloud);

        // Delay fitToScreen so bounding box is fully computed before centering
        setTimeout(() => viewer.fitToScreen(0.6), 100);

        document.getElementById("loading-overlay").classList.add("hidden");
        window.parent.postMessage({ type: "SCAN_LOADED" }, "*");
      });
    } else {
      document.getElementById("loading-overlay").classList.add("hidden");
    }
  </script>

</body>
</html>
